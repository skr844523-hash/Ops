<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملاحظاتي الذكية</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --main-color: #075e54; --chat-bg: #e5ddd5; --my-msg: #dcf8c6; --other-msg: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f0f0f0; overflow: hidden; }

        /* واجهة المفكرة الوهمية */
        #fakeApp { display: flex; flex-direction: column; height: 100%; background: white; z-index: 100; position: absolute; width: 100%; }
        .fake-header { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 1.2rem; }
        #noteArea { flex: 1; padding: 20px; border: none; outline: none; font-size: 1.1rem; resize: none; }
        .save-btn { padding: 15px; background: #28a745; color: white; border: none; font-size: 1rem; cursor: pointer; }

        /* واجهة التطبيق الحقيقي */
        #realApp { display: none; flex-direction: column; height: 100%; background: var(--chat-bg); }
        .chat-header { background: var(--main-color); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; height: 60px; }
        .user-info { display: flex; flex-direction: column; }
        .status { font-size: 0.75rem; color: #adffad; }

        /* شاشة الدخول (ID) */
        #loginScreen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; padding: 20px; gap: 15px; }
        .input-style { width: 100%; max-width: 300px; padding: 12px; border: 1px solid #ddd; border-radius: 25px; text-align: center; outline: none; }
        .login-btn { width: 100%; max-width: 300px; padding: 12px; border-radius: 25px; border: none; background: var(--main-color); color: white; font-weight: bold; cursor: pointer; }

        /* منطقة الدردشة */
        #chatView { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 8px 12px; border-radius: 10px; max-width: 80%; word-wrap: break-word; position: relative; font-size: 0.95rem; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble.me { align-self: flex-start; background: var(--my-msg); border-top-right-radius: 0; }
        .bubble.other { align-self: flex-end; background: var(--other-msg); border-top-left-radius: 0; }
        .msg-time { font-size: 0.65rem; color: #888; display: block; margin-top: 4px; }

        /* مدخل الرسائل */
        .input-bar { background: #f0f0f0; padding: 8px; display: flex; align-items: center; gap: 8px; }
        #msgText { flex: 1; padding: 10px 15px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        #sendBtn { background: var(--main-color); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="fakeApp">
        <div class="fake-header">ملاحظاتي</div>
        <textarea id="noteArea" placeholder="اكتب مذكراتك هنا..."></textarea>
        <button class="save-btn" onclick="checkPassword()">حفظ المذكرة</button>
    </div>

    <div id="realApp">
        <div class="chat-header">
            <div style="width: 40px; height: 40px; border-radius: 50%; background: #ccc; display: flex; align-items: center; justify-content: center;">👤</div>
            <div class="user-info">
                <strong id="headerName">الطرف الآخر</strong>
                <span id="headerStatus" class="status">جاري التحقق...</span>
            </div>
        </div>

        <div id="loginScreen">
            <h3>تسجيل الدخول السري</h3>
            <input type="text" id="myId" class="input-style" placeholder="الـ ID الخاص بك">
            <input type="text" id="friendId" class="input-style" placeholder="ID الطرف الآخر">
            <button class="login-btn" onclick="initChat()">دخول</button>
        </div>

        <div id="chatView">
            <div id="messages"></div>
            <div class="input-bar">
                <input type="text" id="msgText" placeholder="اكتب رسالة...">
                <button id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, onDisconnect, serverTimestamp, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ⚠️ ضع بياناتك هنا بدقة ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "xxxx.firebaseapp.com",
            databaseURL: "https://xxxx-default-rtdb.firebaseio.com",
            projectId: "xxxx",
            appId: "xxxx"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, friendId, roomPath;

        // 1. وظيفة كلمة السر (2244)
        window.checkPassword = () => {
            const secret = document.getElementById('noteArea').value.trim();
            if (secret === "2244") {
                document.getElementById('fakeApp').style.display = "none";
                document.getElementById('realApp').style.display = "flex";
                if (Notification.permission !== "granted") Notification.requestPermission();
            } else {
                alert("تم حفظ المذكرة بنجاح");
            }
        };

        // 2. بدء الدردشة
        window.initChat = () => {
            myId = document.getElementById('myId').value.trim().toLowerCase();
            friendId = document.getElementById('friendId').value.trim().toLowerCase();

            if (!myId || !friendId) return alert("أدخل الـ IDs");

            roomPath = myId < friendId ? `${myId}_${friendId}` : `${friendId}_${myId}`;
            
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('chatView').style.display = "flex";
            document.getElementById('headerName').innerText = friendId;

            setupPresence();
            loadMessages();
        };

        // 3. حالة المتصل والظهور
        function setupPresence() {
            const myStatusRef = ref(db, 'status/' + myId);
            const connectedRef = ref(db, '.info/connected');

            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    onDisconnect(myStatusRef).set({ state: 'offline', last: serverTimestamp() });
                    set(myStatusRef, { state: 'online', last: serverTimestamp() });
                }
            });

            onValue(ref(db, 'status/' + friendId), (snap) => {
                const s = snap.val();
                const statusEl = document.getElementById('headerStatus');
                if (s) {
                    if (s.state === 'online') {
                        statusEl.innerText = "متصل الآن";
                        statusEl.style.color = "#adffad";
                    } else {
                        const date = new Date(s.last);
                        statusEl.innerText = `آخر ظهور ${date.getHours()}:${date.getMinutes()}`;
                        statusEl.style.color = "white";
                    }
                }
            });
        }

        // 4. تحميل الرسائل والإشعارات
        function loadMessages() {
            const chatRef = ref(db, 'chats/' + roomPath);
            onValue(chatRef, (snapshot) => {
                const msgBox = document.getElementById('messages');
                msgBox.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.values(data).forEach(m => {
                        const div = document.createElement('div');
                        div.className = "bubble " + (m.sender === myId ? "me" : "other");
                        div.innerHTML = `${m.text} <span class="msg-time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
                        msgBox.appendChild(div);
                    });
                    msgBox.scrollTop = msgBox.scrollHeight;
                }
            });

            // مراقبة الرسائل الجديدة للإشعارات فقط
            onChildAdded(chatRef, (snap) => {
                const m = snap.val();
                if (m.sender !== myId && document.hidden) {
                    new Notification("رسالة جديدة من " + m.sender, { body: m.text });
                }
            });
        }

        // 5. إرسال الرسالة
        window.sendMessage = () => {
            const txt = document.getElementById('msgText');
            if (txt.value.trim()) {
                push(ref(db, 'chats/' + roomPath), {
                    sender: myId,
                    text: txt.value.trim(),
                    time: serverTimestamp()
                });
                txt.value = "";
            }
        };

        // إرسال بالضغط على Enter
        document.getElementById('msgText').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    </script>
</body>
</html>
